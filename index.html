<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Important Question</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
  }
  h1 {
    color: #6b2737;
    font-size: 2rem;
    margin-bottom: 10px;
    padding: 0 20px;
  }
  #subtitle {
    color: #6b2737;
    margin-bottom: 30px;
    font-size: 1rem;
    min-height: 24px;
  }
  .btn-row {
    position: relative;
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
  }
  button {
    padding: 14px 28px;
    font-size: 1.1rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.15s ease, font-size 0.2s ease;
  }
  #yesBtn {
    background: #4caf50;
    color: white;
  }
  #noBtn {
    background: #f44336;
    color: white;
    position: relative;
  }
  #emoji {
    font-size: 4rem;
    margin-top: 30px;
    display: none;
  }
</style>
</head>
<body>

<h1>Frosty, will you be my girlfriend? 💌</h1>
<div id="subtitle">(Choose wisely, "No" has a mind of its own)</div>

<div class="btn-row">
  <button id="yesBtn" onclick="sayYes()">Yes 💚</button>
  <button id="noBtn" onmouseover="dodge()" onclick="dodge()" ontouchstart="dodge()">No 💔</button>
</div>

<div id="emoji"></div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const subtitle = document.getElementById('subtitle');
  const emojiDiv = document.getElementById('emoji');

  const excuses = [
    "Nope, try again 😏",
    "Nice try 😂",
    "The 'No' button is on vacation 🏖️",
    "Access denied 🚫",
    "That button is decorative only 🎨",
    "404: No not found",
    "Legally I cannot let you click that",
    "Ask again but nicer 🥺",
    "This button believes in true love 💘",
  ];

  let dodgeCount = 0;
  let yesScale = 1;

  function dodge(e) {
    if (e) e.preventDefault(); // stops touch from also firing a click that could dismiss it
    dodgeCount++;

    const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const btnWidth = noBtn.offsetWidth || 100;
    const btnHeight = noBtn.offsetHeight || 50;
    const maxX = Math.max(0, vw - btnWidth - 20);
    const maxY = Math.max(0, vh - btnHeight - 20);
    const randX = Math.random() * maxX;
    const randY = Math.random() * maxY;

    noBtn.style.position = 'fixed';
    noBtn.style.margin = '0';
    noBtn.style.zIndex = '1000';
    noBtn.style.left = randX + 'px';
    noBtn.style.top = randY + 'px';

    const newSize = Math.max(0.75, 1 - dodgeCount * 0.03);
    noBtn.style.fontSize = newSize + 'rem';

    yesScale = Math.min(2.2, 1 + dodgeCount * 0.1);
    yesBtn.style.transform = `scale(${yesScale})`;

    subtitle.textContent = excuses[Math.min(dodgeCount - 1, excuses.length - 1)];
  }

  function sayYes() {
    document.querySelector('h1').textContent = "Yay!! 🎉";
    subtitle.textContent = "Best decision you've made all day, Frosty 💕";
    document.querySelector('.btn-row').style.display = 'none';
    emojiDiv.style.display = 'block';
    emojiDiv.textContent = "🥰💐🎊";
  }
</script>

</body>
</html>
