<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Important Question</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
  }

  /* Floating background hearts */
  .float-heart {
    position: fixed;
    bottom: -10%;
    font-size: 1.5rem;
    opacity: 0.55;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
    user-select: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: #6b2737;
    font-size: 3rem;
    margin-bottom: 16px;
    padding: 0 20px;
    line-height: 1.2;
    opacity: 0;
    animation: dropIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
  }
  #subtitle {
    color: #6b2737;
    margin-bottom: 40px;
    font-size: 1.4rem;
    min-height: 32px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s forwards;
    transition: color 0.2s ease;
  }
  #subtitle.shake-text {
    animation: fadeUp 0.6s ease 0s forwards, wiggle 0.35s ease;
  }

  @keyframes dropIn {
    0% { opacity: 0; transform: translateY(-40px) scale(0.8); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes wiggle {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .btn-row {
    position: relative;
    display: flex;
    gap: 30px;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.8s forwards;
  }
  button {
    padding: 22px 44px;
    font-size: 1.6rem;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), font-size 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    touch-action: manipulation;
  }
  button:active {
    transform: scale(0.94);
  }
  #yesBtn {
    background: #4caf50;
    color: white;
    animation: pulseGlow 1.8s ease-in-out infinite;
    position: relative;
    z-index: 5;
  }
  #yesBtn:hover {
    box-shadow: 0 8px 20px rgba(76,175,80,0.5);
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 6px 14px rgba(0,0,0,0.15); }
    50% { box-shadow: 0 6px 22px rgba(76,175,80,0.55); }
  }
  #noBtn {
    background: #f44336;
    color: white;
    position: relative;
    z-index: 10;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #emoji {
    font-size: 6rem;
    margin-top: 40px;
    display: none;
  }
  #emoji.show {
    display: block;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  h1.celebrate {
    animation: celebrateBounce 0.6s ease;
  }
  @keyframes celebrateBounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.25); }
    50% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: -5%;
    font-size: 1.6rem;
    z-index: 2;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
  }
</style>
</head>
<body>

<div class="content">
  <h1 id="heading">Frosty, will you be my girlfriend? 💌</h1>
  <div id="subtitle">(Choose wisely, "No" has a mind of its own)</div>

  <div class="btn-row">
    <button id="yesBtn" onclick="sayYes()">Yes 💚</button>
    <button id="noBtn">No 💔</button>
  </div>

  <div id="emoji"></div>
</div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const heading = document.getElementById('heading');
  const subtitle = document.getElementById('subtitle');
  const emojiDiv = document.getElementById('emoji');
  const body = document.body;

  const excuses = [
    "Nope, try again 😏",
    "Nice try 😂",
    "The 'No' button is on vacation 🏖️",
    "Access denied 🚫",
    "That button is decorative only 🎨",
    "404: No not found",
    "Legally I cannot let you click that",
    "Ask again but nicer 🥺",
    "This button believes in true love 💘",
  ];

  let dodgeCount = 0;
  let yesScale = 1;

  // --- Floating background hearts ---
  const heartEmojis = ['💕','💗','💖','💓','🩷'];
  function spawnFloatingHeart() {
    const heart = document.createElement('div');
    heart.className = 'float-heart';
    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = Math.random() * 100 + 'vw';
    const duration = 6 + Math.random() * 6;
    heart.style.animationDuration = duration + 's';
    heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    body.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
  }
  setInterval(spawnFloatingHeart, 500);
  for (let i = 0; i < 6; i++) setTimeout(spawnFloatingHeart, i * 200);

  // --- Dodge logic ---
  const EDGE_MARGIN = 16; // keep button this far from every screen edge
  // Conservative fixed size estimate for bounds math — avoids relying on
  // offsetWidth/offsetHeight, which can read stale values mid-CSS-transition
  // or immediately after switching to position:fixed (especially on mobile).
  const BTN_MAX_WIDTH = 220;
  const BTN_MAX_HEIGHT = 90;
  const HOP_DISTANCE = 120; // max px the button moves per dodge — keeps it nearby

  let currentX = null;
  let currentY = null;
  let dodging = false; // guard against double-fire (touch + click / mouseover + click)

  function dodge(e) {
    if (e) e.preventDefault();

    // Mobile fires touchstart AND (synthetic) mouseover AND click in quick
    // succession for the same tap. Without this guard the button hops twice
    // per tap, and the second hop can easily land outside the clamped
    // viewport bounds (or behind the text), which reads as "it disappeared."
    if (dodging) return;
    dodging = true;
    setTimeout(() => { dodging = false; }, 250);

    dodgeCount++;

    const newSize = Math.max(1, 1.6 - dodgeCount * 0.05);
    noBtn.style.fontSize = newSize + 'rem';

    const viewportW = window.innerWidth;
    const viewportH = window.innerHeight;
    const maxX = Math.max(EDGE_MARGIN, viewportW - BTN_MAX_WIDTH - EDGE_MARGIN);
    const maxY = Math.max(EDGE_MARGIN, viewportH - BTN_MAX_HEIGHT - EDGE_MARGIN);

    if (noBtn.style.position !== 'fixed') {
      // First dodge: start from the button's actual on-screen position
      const rect = noBtn.getBoundingClientRect();
      currentX = rect.left;
      currentY = rect.top;
      noBtn.style.position = 'fixed';
    }

    // Clamp currentX/Y in case the button (or viewport) moved between hops,
    // e.g. mobile address bar show/hide changing innerHeight.
    currentX = Math.min(Math.max(currentX, EDGE_MARGIN), maxX);
    currentY = Math.min(Math.max(currentY, EDGE_MARGIN), maxY);

    // Pick a short random hop in a random direction from the current spot,
    // retrying if it would land too close to the Yes button
    const yesRect = yesBtn.getBoundingClientRect();
    const SAFE_DIST = 220; // minimum px gap to keep from Yes button center (accounts for its growth)

    let nextX, nextY, attempts = 0;
    do {
      const angle = Math.random() * Math.PI * 2;
      const distance = HOP_DISTANCE * (0.5 + Math.random() * 0.5); // 60–120px
      nextX = currentX + Math.cos(angle) * distance;
      nextY = currentY + Math.sin(angle) * distance;
      nextX = Math.min(Math.max(nextX, EDGE_MARGIN), maxX);
      nextY = Math.min(Math.max(nextY, EDGE_MARGIN), maxY);
      attempts++;
    } while (
      attempts < 8 &&
      Math.hypot(
        (nextX + BTN_MAX_WIDTH / 2) - (yesRect.left + yesRect.width / 2),
        (nextY + BTN_MAX_HEIGHT / 2) - (yesRect.top + yesRect.height / 2)
      ) < SAFE_DIST
    );

    currentX = nextX;
    currentY = nextY;

    noBtn.style.left = nextX + 'px';
    noBtn.style.top = nextY + 'px';
    noBtn.style.right = 'auto';
    noBtn.style.bottom = 'auto';
    noBtn.style.margin = '0';

    // Safety net: after applying the position, verify the button actually
    // landed fully within the visible viewport. If anything went wrong
    // (NaN, stale rect, etc.) snap it to a guaranteed-safe fallback spot
    // instead of leaving it somewhere invisible.
    requestAnimationFrame(() => {
      const check = noBtn.getBoundingClientRect();
      const offscreen =
        !isFinite(check.left) || !isFinite(check.top) ||
        check.right < 0 || check.bottom < 0 ||
        check.left > window.innerWidth || check.top > window.innerHeight ||
        check.width === 0 || check.height === 0;
      if (offscreen) {
        const fallbackX = window.innerWidth / 2 - 60;
        const fallbackY = window.innerHeight * 0.65;
        currentX = fallbackX;
        currentY = fallbackY;
        noBtn.style.left = fallbackX + 'px';
        noBtn.style.top = fallbackY + 'px';
      }
    });

    yesScale = Math.min(1.5, 1 + dodgeCount * 0.05);
    yesBtn.style.transform = `scale(${yesScale})`;

    subtitle.textContent = excuses[Math.min(dodgeCount - 1, excuses.length - 1)];
    subtitle.classList.remove('shake-text');
    void subtitle.offsetWidth; // restart animation
    subtitle.classList.add('shake-text');
  }

  // Single, simple click handler. Click fires reliably and exactly once per
  // tap on all mobile browsers (unlike pointerenter/mouseover which behave
  // inconsistently on touch), so this is the most robust approach.
  noBtn.addEventListener('click', dodge);

  // Re-clamp button position if the viewport resizes (e.g. mobile keyboard,
  // orientation change) so it never gets stranded off-screen.
  window.addEventListener('resize', () => {
    if (noBtn.style.position === 'fixed' && currentX !== null) {
      const clampedLeft = Math.min(Math.max(currentX, EDGE_MARGIN), window.innerWidth - BTN_MAX_WIDTH - EDGE_MARGIN);
      const clampedTop = Math.min(Math.max(currentY, EDGE_MARGIN), window.innerHeight - BTN_MAX_HEIGHT - EDGE_MARGIN);
      currentX = clampedLeft;
      currentY = clampedTop;
      noBtn.style.left = clampedLeft + 'px';
      noBtn.style.top = clampedTop + 'px';
    }
  });

  // --- Confetti burst ---
  const confettiEmojis = ['🎉','🎊','💐','🥰','💖','✨'];
  function launchConfetti() {
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
        piece.style.left = Math.random() * 100 + 'vw';
        const duration = 2.5 + Math.random() * 2;
        piece.style.animationDuration = duration + 's';
        piece.style.fontSize = (1.2 + Math.random() * 1.6) + 'rem';
        body.appendChild(piece);
        setTimeout(() => piece.remove(), duration * 1000);
      }, i * 40);
    }
  }

  function sayYes() {
    heading.textContent = "Yay!! 🎉";
    heading.classList.add('celebrate');
    subtitle.textContent = "Best decision you've made all day, Frosty 💕";
    document.querySelector('.btn-row').style.display = 'none';
    emojiDiv.textContent = "🥰💐🎊";
    emojiDiv.classList.add('show');
    launchConfetti();
    setInterval(launchConfetti, 3000);
  }
</script>

</body>
</html>
